services:
  db:
    image: postgres:16
    container_name: courses_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: courses
      POSTGRES_USER: courses_user
      POSTGRES_PASSWORD: dyer6550
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courses_user -d courses"]
      interval: 10s
      timeout: 5s
      retries: 5

  scraper:
    build: .
    container_name: courses_scraper
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: